name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pandas openpyxl jinja2
      
      - name: 打包EXE
        run: |
          pyinstaller --onefile `
            --name "订单数据处理工具" `
            --add-data "modules;modules" `
            --hidden-import pandas `
            --hidden-import openpyxl `
            --hidden-import jinja2 `
            --console `
            scripts/process.py
      
      - name: 准备交付包
        run: |
          mkdir 交付包
          copy dist\订单数据处理工具.exe 交付包\
          mkdir 交付包\input
          mkdir 交付包\output
          xcopy /e /y /q input 交付包\input\
      
      - name: 上传交付包
        uses: actions/upload-artifact@v4
        with:
          name: demo1-delivery-package
          path: 交付包/
          retention-days: 90
